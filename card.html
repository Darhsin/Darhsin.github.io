<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw; height: 100vh;
    background: #0f1b28;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 100vw; height: 100vh;
    display: flex;
    background: #0f1b28;
    position: relative;
  }
  .photo-wrap {
    width: 460px; height: 100%;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .photo-wrap img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 15%;
    display: block;
  }
  .photo-fade {
    position: absolute; top: 0; bottom: 0; right: 0; width: 140px;
    background: linear-gradient(to right, rgba(15,27,40,0) 0%, #0f1b28 100%);
  }
  .content {
    flex: 1;
    padding: 56px 56px 56px 50px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .name {
    font-size: 42px; font-weight: 600; color: #f5f1e6; letter-spacing: 0.3px;
    margin-bottom: 10px; line-height: 1.25;
  }
  .role {
    font-size: 22px; color: #d8b866; font-weight: 500; margin-bottom: 4px;
  }
  .org {
    font-size: 19px; color: #9aa4b2; margin-bottom: 30px; line-height: 1.5;
  }
  .divider {
    width: 64px; height: 3px; background: #d8b866; margin-bottom: 30px;
  }
  .info-row {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
  }
  .info-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(216,184,102,0.12);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .info-icon svg { width: 19px; height: 19px; }
  .info-text {
    font-size: 21px; color: #e7e2d6;
  }
  .info-label {
    font-size: 13px; color: #6f7885; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="photo-wrap">
    <img src="https://darhsin.github.io/3b078ee0-_______20260712_184237.png" alt="Dar-Hsin Chen">
    <div class="photo-fade"></div>
  </div>
  <div class="content">
    <div class="name">陳達新 Dar-Hsin Chen, Ph.D.</div>
    <div class="role">Professor of Finance</div>
    <div class="org">Dept. of Business Administration<br>National Taipei University</div>
    <div class="divider"></div>
    <div class="info-row">
      <div class="info-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d8b866" stroke-width="2"><path d="M4 6l8 6 8-6M4 6v12h16V6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="info-label">Email</div>
        <div class="info-text">dhchen@mail.ntpu.edu.tw</div>
      </div>
    </div>
    <div class="info-row">
      <div class="info-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#d8b866" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 4 6 4 9s-1.5 6.4-4 9c-2.5-2.6-4-6-4-9s1.5-6.4 4-9z" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="info-label">Website</div>
        <div class="info-text">darhsin.github.io</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
